<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Partijana</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Varela Round', sans-serif;
    }

    body {
      height: 100vh;
      background: #0b1e5b; /* tamno plava iz brenda */
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }

    .container {
      text-align: center;
      padding: 20px;
    }

    .logo {
      width: 140px;
      height: 140px;
      margin-bottom: 30px;
      animation: pop 1.5s ease;
      object-fit: cover;
    }

    .title {
      font-size: 48px;
      margin-bottom: 15px;
      letter-spacing: 1px;
    }

    .subtitle {
      font-size: 20px;
      opacity: 0.85;
      margin-bottom: 30px;
    }

    .coming {
      font-size: 22px;
      opacity: 0.9;
      margin-top: 10px;
      animation: fadeIn 2s ease;
    }

    /* subtle logo pop animation */
    @keyframes pop {
      0% { transform: scale(0.8); opacity: 0; }
      60% { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }

    @keyframes fadeIn {
      0% { opacity: 0; }
      100% { opacity: 0.9; }
    }

    /* mobile scaling */
    @media (max-width: 600px) {
      .title {
        font-size: 36px;
      }

      .logo {
        width: 110px;
        height: 110px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    
    <img src="logo.png" alt="Partijana Logo" class="logo" />

    <div class="title">Partijana</div>

    <div class="subtitle">
      3 igre. prava ekipa. totalni kaos 🔥🎉
    </div>

    <div class="coming">
      coming soon 👀
    </div>

  </div>
</body>
</html>
